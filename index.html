<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:transparent;overflow:hidden;}
.marquee{
position:fixed;
bottom:0;
width:100%;
background:#d40000;
color:white;
font:bold 32px Arial;
padding:3px 0;
white-space:nowrap;
overflow:hidden;
}
.marquee span{
display:inline-block;
padding-left:100%;
animation:jalan 18s linear infinite;
}
@keyframes jalan{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
</style>
</head>
<body>
<div class="marquee">
<span>🔴 LIVE GAMBIRANOM CHANNEL • LIKE 👍 SHARE ↗ SUBSCRIBE 🔔 • SELAMAT MENYAKSIKAN PERTANDINGAN •</span>
</div>
</body>
</html>
